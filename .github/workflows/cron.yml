name: predict

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (UTC). The script decides what is due.
  workflow_dispatch: {}       # allow manual runs

concurrency:
  group: predict
  cancel-in-progress: false

permissions:
  contents: write             # needed to commit the dedup state back

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run predictor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
        run: python run.py
      - name: Persist state
        run: |
          git config user.name "wc-bot"
          git config user.email "wc-bot@users.noreply.github.com"
          git add state/
          git pull --rebase --autostash origin ${{ github.ref_name }} || true
          git diff --cached --quiet || git commit -m "state update [skip ci]"
          git push
