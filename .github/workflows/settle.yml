name: settle

on:
  schedule:
    - cron: "0 9 * * *"      # 09:00 UTC daily: settle finished matches
    - cron: "0 9 * * 1"      # Mondays 09:00 UTC: also send the weekly self-audit
  workflow_dispatch:
    inputs:
      audit:
        description: "send audit"
        type: boolean
        default: false

concurrency:
  group: settle
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Settle (+ audit on Mondays / manual)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
        run: |
          if [ "${{ github.event.schedule }}" = "0 9 * * 1" ] || [ "${{ inputs.audit }}" = "true" ]; then
            python settle.py --audit
          else
            python settle.py
          fi
      - name: Persist results
        run: |
          git config user.name "wc-bot"
          git config user.email "wc-bot@users.noreply.github.com"
          git add state/
          git pull --rebase --autostash origin ${{ github.ref_name }} || true
          git diff --cached --quiet || git commit -m "results update [skip ci]"
          git push
